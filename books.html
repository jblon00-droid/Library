<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="books.js" defer></script>
</head>
<body id="books__body">
    <section id="landing">
        <nav>
           <div class="nav__container">
                <img class="logo" src="./FES-assets/Library.svg" alt="">
                <ul class="nav__links">
                    <li>
                        <a href="#" class="nav__link">Home</a>
                    </li>
                    <li>
                        <a href="#" class="nav__link">Contact</a>
                    </li>
                    <li>
                        <a href="#" class="nav__link nav__link--primary">Books</a>
                    </li>
                </ul>
                <button class="btn__menu" onclick="openMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="menu__backdrop">
                    <button class="btn__menu btn__menu--close" onclick="closeMenu()">
                        <i class="fas fa-times"></i>
                    </button>
                    <ul class="menu__links">
                        <li class="menu__list">
                            <a href="#" class="menu__link" onclick="closeMenu()">Home</a>
                        </li>
                        <li class="menu__list">
                            <a href="#featured" class="menu__link" onclick="closeMenu()">Books</a>
                        </li>
                        <li class="menu__list">
                            <a class="menu__link no-cursor" onclick="closeMenu()">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>

    <main id="books__main">
        <section>
            <div class="container">
                <div  class="row">
                    <div class="books__header">
                        <h2 class="section__title books__header--title">
                            All <span class="purple">Books</span>
                        </h2>
                        <select id="filter" onchange="filterBooks(event)">
                            <option value="" disabled selected>Sort</option>
                            <option value="LOW__TO__HIGH">Price, Low to High</option>
                            <option value="HIGH__TO__LOW">Price, High to Low</option>
                            <option value="RATING">Rating</option>
                        </select>
                    </div>
                   <div class="books">

                   </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer__container">
            <div class="footer__row">
                <a href="#"></a>
                <figure class="footer__logo--img">
                    <img class="logo" src="./FES-assets/Library.svg" class="footer__logo--img" alt="">
                </figure>
            </div>
            <div class="footer__links">
                <ul>
                    <li><a href="#" class="footer__link">Home</a></li>
                    <li><a href="" class="footer__link no-cursor">About</a></li>
                    <li><a href="#featured" class="footer__link">Books</a></li>
                    <li><a href="" class="footer__link no-cursor">Contact</a></li>
                </ul>
                <div class="footer__copyright">
                    &copy; 2024 Library. All rights reserved.
                </div>
            </div>
        </div>
    </footer>
</body>
